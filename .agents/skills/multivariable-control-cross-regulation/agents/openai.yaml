display_name: Multivariable Control / Cross-Regulation Tuning
short_description: Delay-aware coupled-loop tuning evidence: gains, sampling, saturation, bandwidth, cross-coupling, RGA, delays, and stability margins.
default_prompt: Review this coupled converter control tuning case for cross-regulation. Check that each loop documents before->after gains, sample time, saturation/anti-windup, a bandwidth target, a stability/damping margin, and a retune rationale at a stated operating point, and that the cross-coupling structure is documented. When a gain matrix is available, read the RGA / singular-value interaction metric and pairing verdict. Inventory control-path delays (numeric vs physical), read the phase loss and delay-adjusted margins, and compare declared delay cases. Separate a documented tuning result from an undocumented gain tweak, and report the evidence tier. Only call a retune an improvement when before/after margins improve AND a model-backed time-domain disturbance run backs it; never claim improvement from a gain change alone, from removing a numerical delay, or from an undocumented delay change.
