display_name: Multivariable Control / Cross-Regulation Tuning
short_description: Coupled-loop tuning evidence: gains, sampling, saturation, bandwidth, cross-coupling, and stability margins.
default_prompt: Review this coupled converter control tuning case for cross-regulation. Check that each loop documents before->after gains, sample time, saturation/anti-windup, a bandwidth target, a stability/damping margin, and a retune rationale at a stated operating point, and that the cross-coupling structure is documented. When a gain matrix is available, read the RGA / singular-value interaction metric and pairing verdict. Separate a documented tuning result from an undocumented gain tweak, and report the evidence tier. Only call a retune an improvement when before/after margins improve AND a model-backed time-domain disturbance run backs it; never claim improvement from a gain change alone.
