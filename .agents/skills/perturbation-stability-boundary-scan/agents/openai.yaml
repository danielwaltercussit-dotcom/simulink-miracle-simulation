display_name: Perturbation / Stability Boundary Scan
short_description: Deterministic grid and Monte-Carlo stability boundary scans with seed, refinement, failed-run diagnostics, and an artifact manifest.
default_prompt: Scan the stability boundary for this converter-grid study across the varied parameters (grid strength/SCR, controller gains, filter/parasitic values, operating points). State the single pass/fail metric, threshold, and direction; choose a deterministic grid or a seeded Monte-Carlo scan; report the per-axis boundary, pass fraction, and refined samples near the boundary, plus the artifact manifest. Do not claim a proven stability margin or hardware validation from interpolated pass/fail samples alone; mark the scan provisional if operating point, units, metric, parameter ranges, or (Monte-Carlo) random seed are undocumented, and keep expensive project-wide sweeps opt-in.
